version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-booking-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ticket_booking}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Alembic/the app must never start against a Postgres that's still
      # initializing -- depends_on: condition: service_healthy (below)
      # blocks the backend container until this passes.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ticket_booking}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket-booking-backend
    env_file:
      - ./backend/.env
    environment:
      # Overrides regardless of .env contents: inside Docker's network,
      # the backend must reach Postgres by service name, never localhost --
      # this was a real gap in the original .env (DB_HOST=localhost only
      # works when running the app directly on the host, not in a container
      # on the same Compose network).
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
